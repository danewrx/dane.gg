version: "3.8"

services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: danegg-postgres
    environment:
      POSTGRES_DB: dane.gg
      POSTGRES_USER: dane_gg
      POSTGRES_PASSWORD: daneGGPassword!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - danegg-network
    command: >
      postgres
      -c log_statement=all
      -c log_destination=stderr
      -c log_min_messages=info

  adminer:
    image: docker.io/library/adminer:4.8.1
    container_name: danegg-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - danegg-network

volumes:
  postgres_data:

networks:
  danegg-network:
    driver: bridge