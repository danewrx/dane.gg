version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: danegg-postgres
    environment:
      POSTGRES_DB: danegg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - danegg-network

  adminer:
    image: adminer:4.8.1
    container_name: danegg-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - danegg-network

volumes:
  postgres_data:

networks:
  danegg-network:
    driver: bridge
