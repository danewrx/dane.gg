name: CI Main

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/dane.gg

jobs:
  # ─────────────────────────────────────────────
  # Unit tests on main (non-blocking)
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # Required when tests import backend modules that initialize src/db/index.ts (no real DB calls in unit suite).
      DATABASE_URL: postgresql://ci_unused:ci_unused@127.0.0.1:5432/ci_unused
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install && cd frontend && bun install && cd ../backend && bun install

      - name: Frontend unit tests with coverage
        working-directory: frontend
        run: bun run test:coverage

      - name: Backend unit tests with coverage
        working-directory: backend
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Align LCOV paths with monorepo (Sonar)
        run: |
          sed -i 's|^SF:src/|SF:backend/src/|g' backend/coverage/lcov.info
          sed -i 's|^SF:src/|SF:frontend/src/|g' frontend/coverage/lcov.info

      - name: Upload LCOV for SonarQube
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-main
          path: |
            frontend/coverage/lcov.info
            backend/coverage/lcov.info
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # SonarQube on main (non-blocking)
  # ─────────────────────────────────────────────
  sonarqube:
    name: SonarQube (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download LCOV artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov-main
          path: coverage-reports

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────
  # CodeQL analysis
  # ─────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # ─────────────────────────────────────────────
  # Build & push Docker images to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [codeql]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha
            type=raw,value=latest

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
